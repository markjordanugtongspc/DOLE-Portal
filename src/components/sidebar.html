<button data-drawer-target="default-sidebar" data-drawer-toggle="default-sidebar" aria-controls="default-sidebar" type="button" class="text-heading bg-transparent box-border border border-transparent hover:bg-neutral-secondary-medium focus:ring-4 focus:ring-neutral-tertiary font-medium leading-5 rounded-base ms-3 mt-3 text-sm p-2 focus:outline-none inline-flex sm:hidden cursor-pointer">
   <span class="sr-only">Open sidebar</span>
   <svg class="w-6 h-6" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24">
      <path stroke="currentColor" stroke-linecap="round" stroke-width="2" d="M5 7h14M5 12h14M5 17h10"/>
   </svg>
</button>

<aside id="default-sidebar" class="fixed top-0 left-0 z-40 w-64 h-full transition-transform -translate-x-full sm:translate-x-0" aria-label="Sidebar">
   <div class="h-full px-3 py-4 overflow-y-auto bg-white dark:bg-gray-900 border-e border-gray-200 dark:border-gray-800 transition-colors flex flex-col">
      <!-- Brand Header -->
      <div class="border-b border-gray-200 dark:border-gray-800 pb-4 mb-4 flex items-center gap-2">
         <img src="/src/assets/logos/dole_logo.png" class="h-8 w-8 drop-shadow-sm" alt="DOLE Logo" />
         <div class="flex flex-col">
            <span class="text-sm font-extrabold text-blue-700 dark:text-blue-500 tracking-wider uppercase leading-none">DOLE PORTAL</span>
            <span id="sidebar-role-badge" class="text-[9px] font-bold text-gray-400 mt-1 uppercase tracking-widest leading-none">System User</span>
         </div>
      </div>
      <ul id="sidebar-nav-list" class="space-y-2 font-medium">
         <!-- Links will be injected dynamically by sidebar.js -->
      </ul>

      <div class="mt-auto pt-4">
         <div class="rounded-[22px] border border-gray-200 bg-gray-100/95 p-2.5 dark:border-gray-800 dark:bg-gray-950/85 shadow-sm">
            <div class="flex items-start gap-2">
               <div class="relative shrink-0">
                  <div id="sidebar-user-avatar" class="flex h-9 w-9 items-center justify-center rounded-full bg-gradient-to-br from-blue-600 to-sky-400 text-[11px] font-black uppercase text-white shadow-sm">SU</div>
                  <span class="absolute bottom-0 right-0 h-2.5 w-2.5 rounded-full border-2 border-white bg-emerald-400 dark:border-gray-950"></span>
               </div>
               <div class="min-w-0 flex-1">
                  <div class="flex items-start justify-between gap-1.5">
                     <div class="min-w-0">
                        <p id="sidebar-user-name" class="truncate text-[12px] font-extrabold leading-4 text-gray-900 dark:text-white">System User</p>
                        <p id="sidebar-user-subtitle" class="mt-0.5 truncate text-[10px] leading-3.5 text-gray-500 dark:text-gray-400">portal@dole.local</p>
                     </div>
                     <span id="sidebar-user-role-pill" class="shrink-0 rounded-full bg-emerald-400 px-2 py-0.5 text-[8px] font-extrabold uppercase tracking-wide text-emerald-950 shadow-sm">Staff</span>
                  </div>
               </div>
            </div>

            <div class="mt-3 space-y-1.5 border-t border-gray-200 pt-2.5 dark:border-gray-800">
               <button id="sidebar-profile-settings-btn" type="button" class="w-full rounded-xl border border-gray-200 bg-white/80 px-3 py-2 text-xs font-bold text-gray-700 transition-colors hover:border-blue-300 hover:text-blue-700 dark:border-gray-700 dark:bg-gray-900/70 dark:text-gray-200 dark:hover:border-blue-800 dark:hover:text-blue-400 cursor-pointer">Profile Settings</button>
               <button id="sidebar-profile-logout-btn" type="button" class="w-full rounded-xl bg-red-600 px-3 py-2 text-xs font-bold text-white shadow-sm transition-all hover:bg-red-700 focus:outline-none focus:ring-4 focus:ring-red-200 dark:hover:bg-red-500 dark:focus:ring-red-950/60 cursor-pointer">Logout</button>
            </div>
         </div>

         <div class="mt-3 rounded-2xl border border-gray-200 bg-gray-100/95 p-1 dark:border-gray-800 dark:bg-gray-950/85 shadow-inner">
            <div class="grid grid-cols-2 gap-1">
               <button type="button" class="theme-toggle-btn theme-toggle-segment flex items-center justify-center gap-1.5 rounded-xl px-2.5 py-2 text-xs font-semibold text-gray-500 transition-all duration-200 hover:text-gray-900 dark:text-gray-400 dark:hover:text-white cursor-pointer" data-theme-target="light">
                  <svg class="theme-toggle-light-icon h-4 w-4" data-theme-target="light" fill="currentColor" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg"><path fill-rule="evenodd" d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1Zm4 8a4 4 0 11-8 0 4 4 0 018 0Zm-.464 4.95.707.707a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414Zm2.12-10.607a1 1 0 010 1.414l-.706.707a1 1 0 11-1.414-1.414l.707-.707a1 1 0 011.414 0ZM17 11a1 1 0 100-2h-1a1 1 0 100 2h1Zm-7 4a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1ZM5.05 6.464A1 1 0 106.465 5.05l-.708-.707a1 1 0 00-1.414 1.414l.707.707Zm1.414 8.486-.707.707a1 1 0 01-1.414-1.414l.707-.707a1 1 0 011.414 1.414ZM4 11a1 1 0 100-2H3a1 1 0 000 2h1Z" clip-rule="evenodd"></path></svg>
                  <span>Light</span>
               </button>
               <button type="button" class="theme-toggle-btn theme-toggle-segment flex items-center justify-center gap-1.5 rounded-xl px-2.5 py-2 text-xs font-semibold text-gray-500 transition-all duration-200 hover:text-gray-900 dark:text-gray-400 dark:hover:text-white cursor-pointer" data-theme-target="dark">
                  <svg class="theme-toggle-dark-icon h-4 w-4" data-theme-target="dark" fill="currentColor" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg"><path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"></path></svg>
                  <span>Dark</span>
               </button>
            </div>
         </div>

         <div class="pt-4 px-1 text-[10px] text-gray-400 dark:text-gray-500 font-bold tracking-widest uppercase select-none flex items-center justify-between">
            <span>Portal Version</span>
            <span id="app-version-display">v0.0.0</span>
         </div>
      </div>
   </div>
</aside>
<div id="sidebar-logout-confirmation" class="hidden fixed inset-0 z-[120] flex items-center justify-center bg-gray-950/55 px-3 py-6 backdrop-blur-md sm:px-6 sm:py-6" aria-hidden="true">
   <div id="sidebar-logout-backdrop" class="absolute inset-0" data-logout-close="true"></div>
   <div class="relative w-full max-w-[22rem] overflow-hidden border border-white/10 bg-white shadow-2xl dark:border-gray-800 dark:bg-gray-900 sm:max-w-[24rem]">
      <div class="px-4 pb-4 pt-4 sm:px-5 sm:pb-5 sm:pt-5">
         <div class="flex flex-col items-center text-center">
            <div class="mb-3 flex h-14 w-14 items-center justify-center bg-red-50 text-red-500 dark:bg-red-950/40 dark:text-red-400 sm:h-16 sm:w-16">
               <svg class="h-7 w-7 sm:h-8 sm:w-8" fill="none" stroke="currentColor" stroke-width="1.9" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 9V5.25A2.25 2.25 0 0 0 13.5 3h-6A2.25 2.25 0 0 0 5.25 5.25v13.5A2.25 2.25 0 0 0 7.5 21h6a2.25 2.25 0 0 0 2.25-2.25V15"></path>
                  <path stroke-linecap="round" stroke-linejoin="round" d="M12 9l3 3m0 0-3 3m3-3H8.25"></path>
               </svg>
            </div>
            <h3 class="text-[2rem] font-black leading-none tracking-tight text-gray-900 dark:text-white sm:text-[2.35rem]">Log out</h3>
            <p class="mt-3 text-sm leading-6 text-gray-500 dark:text-gray-400 sm:text-base">Are you sure you want to log out?</p>
         </div>

         <div class="mt-6 grid grid-cols-2 gap-3 sm:mt-7">
            <button id="sidebar-logout-cancel-btn" type="button" class="inline-flex items-center justify-center border border-gray-200 bg-white px-4 py-2.5 text-sm font-bold text-gray-900 shadow-sm transition-colors hover:bg-gray-50 dark:border-gray-700 dark:bg-gray-900 dark:text-white dark:hover:bg-gray-800 cursor-pointer" data-logout-close="true">Cancel</button>
            <button id="sidebar-logout-confirm-btn" type="button" class="inline-flex items-center justify-center bg-red-500 px-4 py-2.5 text-sm font-bold text-white shadow-sm transition-colors hover:bg-red-600 dark:bg-red-500 dark:hover:bg-red-400 cursor-pointer">Log out</button>
         </div>
      </div>
   </div>
</div>
