<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/x-icon" href="/dole-logo.ico" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Staff Dashboard - DOLE Portal</title>
  <script>
    if (localStorage.getItem('color-theme') === 'dark' || (!('color-theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
      document.documentElement.classList.add('dark');
    } else {
      document.documentElement.classList.remove('dark')
    }
  </script>
</head>

<body class="bg-gray-50 dark:bg-gray-950 text-gray-900 dark:text-white transition-colors duration-300">

  <!-- Sidebar placeholder dynamically loaded by sidebar.js -->
  <div id="sidebar" data-role="staff" data-active="dashboard"></div>

  <!-- Content Layout wrapper shifting content sm:ml-64 to clear the fixed sidebar -->
  <div class="sm:ml-64 min-h-screen flex flex-col">

    <!-- Main Content -->
    <main class="flex-1 p-6 md:p-8 space-y-6">
      <div class="flex flex-col md:flex-row md:items-center justify-between gap-4 border-b border-gray-100 dark:border-gray-800 pb-4">
        <div>
          <h1 class="text-2xl font-extrabold text-gray-900 dark:text-white">Staff Dashboard</h1>
          <p class="text-xs font-semibold text-gray-500 dark:text-gray-400 mt-1">Manage local employment records and generate system reports</p>
        </div>
      </div>

      <!-- Dashboard Cards Grid -->
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div class="bg-white dark:bg-gray-900 p-6 rounded-xl border border-gray-200 dark:border-gray-800 shadow-sm transition-all hover:shadow-md">
          <h3 class="text-xs font-bold text-gray-500 dark:text-gray-400 uppercase tracking-wider">My Managed Records</h3>
          <p class="text-3xl font-extrabold text-blue-700 dark:text-blue-500 mt-2">312</p>
        </div>
        <div class="bg-white dark:bg-gray-900 p-6 rounded-xl border border-gray-200 dark:border-gray-800 shadow-sm transition-all hover:shadow-md">
          <h3 class="text-xs font-bold text-gray-500 dark:text-gray-400 uppercase tracking-wider">Pending Approvals</h3>
          <p class="text-3xl font-extrabold text-amber-500 mt-2">8</p>
        </div>
      </div>
    </main>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>

</html>
