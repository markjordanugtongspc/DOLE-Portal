<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/x-icon" href="/dole-logo.ico" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Manage Systems - DOLE Portal</title>
  <script>
    if (localStorage.getItem('color-theme') === 'dark' || (!('color-theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
      document.documentElement.classList.add('dark');
    } else {
      document.documentElement.classList.remove('dark')
    }
  </script>
  <script>
    (function () {
      var path = window.location.pathname;
      var match = path.match(/\/src\/pages\/user\/(admin|staff)\//);
      if (!match) return;

      var rawSession = localStorage.getItem('dole_session');
      if (!rawSession) {
        window.location.replace('/?auth=login_required');
        return;
      }

      try {
        var user = JSON.parse(rawSession);
        var roleId = Number(user && user.role_id);
        var requiredRole = match[1];
        var actualRole = roleId === 1 ? 'admin' : roleId === 2 || roleId === 3 ? 'staff' : null;

        if (!actualRole) {
          localStorage.removeItem('dole_session');
          window.location.replace('/?auth=login_required');
          return;
        }

        if (actualRole !== requiredRole) {
          window.location.replace(actualRole === 'admin' ? '/src/pages/user/admin/dashboard/' : '/src/pages/user/staff/dashboard/');
        }
      } catch (error) {
        localStorage.removeItem('dole_session');
        window.location.replace('/?auth=login_required');
      }
    })();
  </script>
</head>

<body class="bg-gray-50 dark:bg-gray-950 text-gray-900 dark:text-white transition-colors duration-300">

  <!-- Sidebar placeholder dynamically loaded by sidebar.js -->
  <div id="sidebar" data-role="admin" data-active="systems"></div>

  <!-- Content Layout wrapper shifting content sm:ml-64 to clear the fixed sidebar -->
  <div class="sm:ml-64 min-h-screen flex flex-col">

    <!-- Main Content -->
    <main id="main-content" class="flex-1 p-6 md:p-8 space-y-6 transition-all duration-300">
      <div class="flex flex-col md:flex-row md:items-center justify-between gap-4 border-b border-gray-300 dark:border-gray-700 pb-4">
        <div>
          <h2 class="text-2xl font-extrabold text-gray-900 dark:text-white">Manage Systems</h2>
          <p class="text-xs text-gray-500 dark:text-gray-400 mt-1">Configure, monitor, and deploy portal sub-systems dynamically.</p>
        </div>
        <nav class="flex" aria-label="Breadcrumb">
          <ol class="inline-flex items-center space-x-1 md:space-x-2 rtl:space-x-reverse">
            <li class="inline-flex items-center">
              <a href="/" class="inline-flex items-center text-sm font-medium text-gray-500 hover:text-blue-700 dark:text-gray-400 dark:hover:text-blue-500 transition-colors cursor-pointer">
                <svg class="w-4 h-4 me-1.5" viewBox="0 0 24 24" aria-hidden="true" xmlns="http://www.w3.org/2000/svg">
                  <g transform="matrix(0.77 0 0 0.77 12 12)">
                    <path style="stroke: none; stroke-width: 1; stroke-dasharray: none; stroke-linecap: butt; stroke-dashoffset: 0; stroke-linejoin: miter; stroke-miterlimit: 4; fill: currentColor; fill-rule: nonzero; opacity: 1;" transform="translate(-16, -16)" d="M 20 3 C 15.054688 3 11 7.054688 11 12 C 11 12.519531 11.085938 12.976563 11.15625 13.4375 L 3.28125 21.28125 L 3 21.59375 L 3 29 L 10 29 L 10 26 L 13 26 L 13 23 L 16 23 L 16 20.03125 C 17.179688 20.609375 18.554688 21 20 21 C 24.945313 21 29 16.945313 29 12 C 29 7.054688 24.945313 3 20 3 Z M 20 5 C 23.855469 5 27 8.144531 27 12 C 27 15.855469 23.855469 19 20 19 C 18.789063 19 17.542969 18.644531 16.59375 18.125 L 16.34375 18 L 14 18 L 14 21 L 11 21 L 11 24 L 8 24 L 8 27 L 5 27 L 5 22.4375 L 12.90625 14.5 L 13.28125 14.15625 L 13.1875 13.625 C 13.085938 13.023438 13 12.488281 13 12 C 13 8.144531 16.144531 5 20 5 Z M 22 8 C 20.894531 8 20 8.894531 20 10 C 20 11.105469 20.894531 12 22 12 C 23.105469 12 24 11.105469 24 10 C 24 8.894531 23.105469 8 22 8 Z" stroke-linecap="round" />
                  </g>
                </svg>
                Login
              </a>
            </li>
            <li>
              <div class="flex items-center space-x-1.5">
                <svg class="w-3.5 h-3.5 rtl:rotate-180 text-gray-400 dark:text-gray-600" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24"><path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="m9 5 7 7-7 7"/></svg>
                <a href="#" class="inline-flex items-center text-sm font-medium text-gray-500 hover:text-blue-700 dark:text-gray-400 dark:hover:text-blue-500 transition-colors cursor-pointer">Manage Systems</a>
              </div>
            </li>
            <li aria-current="page">
              <div class="flex items-center space-x-1.5">
                <svg class="w-3.5 h-3.5 rtl:rotate-180 text-gray-400 dark:text-gray-600" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24"><path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="m9 5 7 7-7 7"/></svg>
                <span class="inline-flex items-center text-sm font-medium text-gray-400 dark:text-gray-500 select-none">User</span>
              </div>
            </li>
          </ol>
        </nav>
      </div>

      <!-- Systems Controls -->
      <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-3 mt-4 mb-6">
        <div class="flex items-center bg-gray-100 dark:bg-gray-800 rounded p-0.5 shadow-inner border border-gray-200 dark:border-gray-700 h-[40px] sm:h-[32px] w-full sm:w-max">
          <button id="btn-systems-sort-all" class="w-full sm:w-auto px-6 sm:px-2.5 py-2 sm:py-1 text-xs sm:text-[11px] font-bold rounded shadow-sm bg-white dark:bg-gray-700 text-gray-900 dark:text-white cursor-pointer select-none" type="button" aria-pressed="true">ALL</button>
          <button id="btn-systems-archived" class="w-full sm:w-auto px-6 sm:px-2.5 py-2 sm:py-1 text-xs sm:text-[11px] font-bold rounded text-gray-500 dark:bg-gray-800 dark:text-gray-400 hover:text-gray-900 dark:hover:text-white cursor-pointer select-none transition-colors" type="button" aria-pressed="false">ARCHIVED</button>
        </div>

        <button id="btn-add-system" class="cursor-pointer inline-flex items-center justify-center text-white bg-blue-700 dark:bg-blue-600 hover:bg-blue-800 dark:hover:bg-blue-700 font-bold text-sm px-5 py-2.5 shadow-sm transition-all duration-300 group hover:-skew-x-12 select-none border border-transparent" type="button" data-drawer-target="add-system-drawer" data-drawer-show="add-system-drawer" data-drawer-placement="right" aria-controls="add-system-drawer">
           <div class="group-hover:skew-x-12 inline-flex items-center gap-2 transition-transform duration-300">
             <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
               <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15"></path>
             </svg>
             <span>Add System</span>
           </div>
        </button>
      </div>

      <!-- Systems Grid -->
      <div id="systems-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
         <!-- Cards dynamically loaded -->
      </div>
    </main>
  </div>

  <!-- Right Drawer Component -->
  <div id="add-system-drawer" class="fixed top-0 right-0 z-50 h-screen p-6 overflow-y-auto transition-transform translate-x-full bg-white dark:bg-gray-900 w-96 border-s border-gray-200 dark:border-gray-800 flex flex-col justify-between" tabindex="-1" aria-labelledby="drawer-right-label">
    <div>
      <div class="border-b border-gray-100 dark:border-gray-800 pb-4 mb-5 flex items-center justify-between">
        <h5 id="drawer-right-label" class="inline-flex items-center text-lg font-bold text-gray-900 dark:text-white uppercase tracking-wider">
          <svg class="w-5 h-5 me-2 text-blue-700 dark:text-blue-500" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v6m3-3H9m12 0a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z" />
          </svg>
          <span id="drawer-title-mode">Add New System</span>
        </h5>
        <button id="close-drawer-btn" type="button" data-drawer-hide="add-system-drawer" aria-controls="add-system-drawer" class="cursor-pointer text-gray-400 hover:text-gray-900 dark:hover:text-white hover:bg-gray-100 dark:hover:bg-gray-800 rounded-lg w-8 h-8 flex items-center justify-center transition-colors">
          <svg class="w-5 h-5" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18 17.94 6M18 18 6.06 6"/></svg>
          <span class="sr-only">Close menu</span>
        </button>
      </div>

      <form id="system-form" class="space-y-4">
        <!-- Hidden input for edit mode -->
        <input type="hidden" id="system-id" />
        
        <div>
          <label for="system-name" class="block mb-2 text-xs font-bold uppercase tracking-wider text-gray-700 dark:text-gray-300">System Name <span class="text-red-500">*</span></label>
          <input type="text" id="system-name" class="bg-gray-50 dark:bg-gray-800 border border-gray-300 dark:border-gray-700 text-gray-900 dark:text-white text-sm rounded-none focus:ring-blue-500 focus:border-blue-500 block w-full p-2.5" placeholder="e.g. Assessor Portal" required />
        </div>

        <div>
          <label for="system-desc" class="block mb-2 text-xs font-bold uppercase tracking-wider text-gray-700 dark:text-gray-300">Description <span class="text-red-500">*</span></label>
          <textarea id="system-desc" rows="4" class="bg-gray-50 dark:bg-gray-800 border border-gray-300 dark:border-gray-700 text-gray-900 dark:text-white text-sm rounded-none focus:ring-blue-500 focus:border-blue-500 block w-full p-2.5" placeholder="Short description of the system's purpose..." required></textarea>
        </div>

        <div>
          <label for="system-url" class="block mb-2 text-xs font-bold uppercase tracking-wider text-gray-700 dark:text-gray-300">System URL <span class="text-gray-400 dark:text-gray-500 font-normal normal-case">(Optional)</span></label>
          <input type="url" id="system-url" class="bg-gray-50 dark:bg-gray-800 border border-gray-300 dark:border-gray-700 text-gray-900 dark:text-white text-sm rounded-none focus:ring-blue-500 focus:border-blue-500 block w-full p-2.5" placeholder="https://example-dole.gov.ph" />
        </div>

        <div>
          <label for="system-color" class="block mb-2 text-xs font-bold uppercase tracking-wider text-gray-700 dark:text-gray-300">Theme Color</label>
          <div class="flex items-center space-x-3">
            <input type="color" id="system-color" class="p-1 h-10 w-14 block bg-white border border-gray-200 cursor-pointer rounded-none disabled:opacity-50 disabled:pointer-events-none dark:bg-gray-900 dark:border-gray-700" value="#10b981" title="Choose your color">
            <span class="text-xs text-gray-500 dark:text-gray-400">Used for card accent color.</span>
          </div>
        </div>

        <div>
          <label class="block mb-2 text-xs font-bold uppercase tracking-wider text-gray-700 dark:text-gray-300">System Image</label>
          <div class="flex items-center justify-center w-full relative">
            <label for="system-image" id="dropzone-label" class="flex flex-col items-center justify-center w-full h-32 bg-gray-50 dark:bg-gray-800 border-2 border-dashed border-gray-300 dark:border-gray-600 rounded-base cursor-pointer hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors relative overflow-hidden group">
                <div id="dropzone-content" class="flex flex-col items-center justify-center text-gray-500 dark:text-gray-400">
                    <svg class="w-8 h-8 mb-2" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24"><path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h3a3 3 0 0 0 0-6h-.025a5.56 5.56 0 0 0 .025-.5A5.5 5.5 0 0 0 7.207 9.021C7.137 9.017 7.071 9 7 9a4 4 0 1 0 0 8h2.167M12 19v-9m0 0-2 2m2-2 2 2"/></svg>
                    <p class="mb-1 text-xs"><span class="font-bold">Click to upload</span> or drag and drop</p>
                    <p class="text-[10px] uppercase font-semibold">PNG, JPG, JPEG (MAX. 3MB)</p>
                </div>
                <!-- Preview Image inside the dropzone -->
                <img id="system-image-preview" src="" alt="Preview" class="absolute inset-0 w-full h-full object-cover hidden" />
                
                <!-- Hover overlay for removing/changing image when preview is active -->
                <div id="image-change-overlay" class="absolute inset-0 bg-black/60 hidden flex flex-col items-center justify-center text-white opacity-0 group-hover:opacity-100 transition-opacity">
                    <svg class="w-6 h-6 mb-1" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h3a3 3 0 0 0 0-6h-.025a5.56 5.56 0 0 0 .025-.5A5.5 5.5 0 0 0 7.207 9.021C7.137 9.017 7.071 9 7 9a4 4 0 1 0 0 8h2.167M12 19v-9m0 0-2 2m2-2 2 2"/></svg>
                    <span class="text-xs font-bold uppercase tracking-wider">Change Image</span>
                </div>

                <input id="system-image" type="file" accept="image/png, image/jpeg, image/jpg" class="hidden" />
            </label>
          </div>
          <p id="image-error-msg" class="mt-1 text-xs text-red-500 hidden font-semibold">File must be PNG/JPG under 3MB.</p>
        </div>

        <button type="submit" class="cursor-pointer inline-flex items-center justify-center w-full text-white bg-blue-700 dark:bg-blue-600 hover:bg-blue-800 dark:hover:bg-blue-700 font-bold text-sm px-5 py-2.5 shadow-sm transition-all duration-300 hover:-skew-x-12 select-none border border-transparent">
          <span class="inline-block" id="btn-submit-text">Add System</span>
        </button>
      </form>
    </div>
  </div>

  <!-- Confirm Action Modal (Flowbite) -->
  <div id="confirmActionModal" tabindex="-1" aria-hidden="true"
      class="hidden overflow-y-auto overflow-x-hidden fixed top-0 right-0 left-0 z-50 justify-center items-center w-full md:inset-0 h-[calc(100%-1rem)] max-h-full">
      <div class="relative p-4 w-full max-w-md max-h-full">
          <div class="relative bg-white rounded-lg shadow-sm dark:bg-gray-800 border border-gray-100 dark:border-gray-700">
              <!-- Modal header -->
              <div class="flex items-center justify-between p-4 md:p-5 border-b rounded-t dark:border-gray-600 border-gray-200">
                  <h3 class="text-lg font-bold text-gray-900 dark:text-white" id="confirm-modal-title">
                      Confirm Action
                  </h3>
                  <button type="button" class="cursor-pointer text-gray-400 bg-transparent hover:bg-gray-200 hover:text-gray-900 rounded-lg text-sm w-8 h-8 ms-auto inline-flex justify-center items-center dark:hover:bg-gray-600 dark:hover:text-white" data-modal-hide="confirmActionModal">
                      <svg class="w-3 h-3" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 14 14">
                          <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="m1 1 6 6m0 0 6 6M7 7l6-6M7 7l-6 6"/>
                      </svg>
                      <span class="sr-only">Close modal</span>
                  </button>
              </div>
              <!-- Modal body -->
              <div class="p-4 md:p-5 text-center">
                  <svg class="mx-auto mb-4 text-gray-400 w-12 h-12 dark:text-gray-200" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 20 20">
                      <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 11V6m0 8h.01M19 10a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z"/>
                  </svg>
                  <p class="mb-5 text-sm font-semibold text-gray-600 dark:text-gray-400" id="confirm-modal-text">
                      Are you sure you want to perform this action?
                  </p>
                  <div class="flex items-center justify-center gap-3">
                      <button id="btn-confirm-yes" type="button" class="cursor-pointer text-gray-900 bg-white hover:bg-gray-100 focus:ring-4 focus:outline-none focus:ring-gray-200 border border-gray-300 font-semibold rounded-lg text-xs px-4 py-2 dark:bg-gray-700 dark:text-gray-300 dark:border-gray-500 dark:hover:bg-gray-600 dark:focus:ring-gray-700 transition-colors">
                          Yes, I'm sure
                      </button>
                      <button id="btn-confirm-no" data-modal-hide="confirmActionModal" type="button" class="cursor-pointer text-red-700 bg-red-50 hover:bg-red-100 border border-red-200 font-bold rounded-lg text-xs px-5 py-2.5 dark:bg-red-950/20 dark:text-red-400 dark:border-red-900/30 dark:hover:bg-red-900/40 dark:hover:text-red-300 transition-colors">
                          No, Cancel
                      </button>
                  </div>
              </div>
          </div>
      </div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>

</html>
