<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/x-icon" href="/dole-logo.ico" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Read DOLE Knowledge Base Article" />
  <title>Article — DOLE Portal</title>
  <script>
    if (localStorage.getItem('color-theme') === 'dark' || (!('color-theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
      document.documentElement.classList.add('dark');
    } else {
      document.documentElement.classList.remove('dark')
    }
  </script>
  <script>
    (function () {
      var path = window.location.pathname;
      var match = path.match(/\/src\/pages\/user\/(admin|staff)\//);
      if (!match) return;

      var rawSession = localStorage.getItem('dole_session');
      if (!rawSession) {
        window.location.replace('/?auth=login_required');
        return;
      }

      try {
        var user = JSON.parse(rawSession);
        var roleId = Number(user && user.role_id);
        var requiredRole = match[1];
        var actualRole = roleId === 1 ? 'admin' : roleId === 2 || roleId === 3 ? 'staff' : null;

        if (!actualRole) {
          localStorage.removeItem('dole_session');
          window.location.replace('/?auth=login_required');
          return;
        }

        if (actualRole !== requiredRole) {
          window.location.replace(actualRole === 'admin' ? '/src/pages/user/admin/dashboard/' : '/src/pages/user/staff/dashboard/');
        }
      } catch (error) {
        localStorage.removeItem('dole_session');
        window.location.replace('/?auth=login_required');
      }
    })();
  </script>
</head>

<body class="bg-gray-50 dark:bg-gray-950 text-gray-900 dark:text-white transition-colors duration-300">

  <!-- Sidebar placeholder dynamically loaded by sidebar.js -->
  <div id="sidebar" data-role="admin" data-active="articles"></div>

  <!-- Content Layout wrapper shifting content sm:ml-64 to clear the fixed sidebar -->
  <div class="sm:ml-64 min-h-screen flex flex-col">

    <!-- Main Content -->
    <main id="main-content" class="flex-1 transition-all duration-300">
      
      <section class="bg-white dark:bg-gray-900 h-full min-h-screen border-l border-gray-200 dark:border-gray-800">

        <!-- Breadcrumbs + Back Button Header -->
        <div class="p-6 md:px-8 pt-8 border-b border-gray-200 dark:border-gray-800">
            <div class="flex flex-wrap items-center justify-between gap-4">
                <div class="flex flex-wrap items-center gap-4">
                <!-- Breadcrumbs -->

                        <li class="inline-flex items-center">
                            <a href="/src/pages/user/admin/dashboard/" id="btn-back-articles" class="group inline-flex items-center text-sm font-semibold text-gray-500 hover:text-blue-700 dark:text-gray-400 dark:hover:text-blue-500 transition-colors cursor-pointer">
                                <span class="relative me-1.5 inline-flex h-4 w-4 shrink-0 items-center justify-center">
                                    <svg class="absolute h-4 w-4 transition duration-75 group-hover:hidden" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24"><path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6.025A7.5 7.5 0 1 0 17.975 14H10V6.025Z"/><path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.5 3c-.169 0-.334.014-.5.025V11h7.975c.011-.166.025-.331.025-.5A7.5 7.5 0 0 0 13.5 3Z"/></svg>
                                    <svg class="absolute hidden h-4 w-4 text-blue-600 transition duration-75 group-hover:block dark:text-blue-500" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" viewBox="0 0 24 24"><path d="M13.5 2c-.178 0-.356.013-.492.022l-.074.005a1 1 0 0 0-.934.998V11a1 1 0 0 0 1 1h7.975a1 1 0 0 0 .998-.934l.005-.074A7.04 7.04 0 0 0 22 10.5 8.5 8.5 0 0 0 13.5 2Z"/><path d="M11 6.025a1 1 0 0 0-1.065-.998 8.5 8.5 0 1 0 9.038 9.039A1 1 0 0 0 17.975 13H11V6.025Z"/></svg>
                                </span>
                                Dashboard
                            </a>
                        </li>
                        <li>
                            <div class="flex items-center space-x-1.5">
                                <svg class="w-3.5 h-3.5 rtl:rotate-180 text-gray-400 dark:text-gray-600" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24"><path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="m9 5 7 7-7 7"/></svg>
                                <a href="/src/pages/user/admin/tickets/" class="inline-flex items-center text-sm font-semibold text-gray-500 hover:text-blue-700 dark:text-gray-400 dark:hover:text-blue-500 transition-colors cursor-pointer">
                                    <svg class="w-4 h-4 me-1.5" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24"><path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18.5 12A2.5 2.5 0 0 1 21 9.5V7a1 1 0 0 0-1-1H4a1 1 0 0 0-1 1v2.5a2.5 2.5 0 0 1 0 5V17a1 1 0 0 0 1 1h16a1 1 0 0 0 1-1v-2.5a2.5 2.5 0 0 1-2.5-2.5Z"/></svg>
                                    Manage Tickets
                                </a>
                            </div>
                        </li>
                        <li>
                            <div class="flex items-center space-x-1.5">
                                <svg class="w-3.5 h-3.5 rtl:rotate-180 text-gray-400 dark:text-gray-600" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24"><path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="m9 5 7 7-7 7"/></svg>
                                <a href="/src/pages/user/admin/articles/" class="inline-flex items-center text-sm font-semibold text-gray-500 hover:text-blue-700 dark:text-gray-400 dark:hover:text-blue-500 transition-colors cursor-pointer">Manage Articles</a>
                            </div>
                        </li>
                        <li aria-current="page">
                            <div class="flex items-center space-x-1.5">
                                <svg class="w-3.5 h-3.5 rtl:rotate-180 text-gray-400 dark:text-gray-600" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24"><path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="m9 5 7 7-7 7"/></svg>
                                <span id="breadcrumb-article-title" class="inline-flex items-center text-sm font-semibold text-gray-400 dark:text-gray-500 select-none truncate max-w-[200px] lg:max-w-sm">Loading...</span>
                            </div>
                        </li>
                    </ol>
                    </nav>
                </div>

                <!-- Admin Action: Edit Article Button -->
                <button type="button" id="btn-edit-article" data-modal-target="editArticleModal" data-modal-show="editArticleModal" class="cursor-pointer text-white bg-blue-700 hover:bg-blue-800 focus:ring-4 focus:ring-blue-300 font-medium rounded-lg text-sm px-4 py-2 dark:bg-blue-600 dark:hover:bg-blue-700 focus:outline-none dark:focus:ring-blue-800 transition-colors flex items-center gap-2 shadow-sm">
                    <svg class="w-4 h-4" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24">
                        <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="m14.304 4.844 2.852 2.852M7 7H4a1 1 0 0 0-1 1v10a1 1 0 0 0 1 1h11a1 1 0 0 0 1-1v-4.5m2.409-9.91a2.017 2.017 0 0 1 0 2.853l-6.844 6.844L8 14l.713-3.565 6.844-6.844a2.015 2.015 0 0 1 2.852 0Z"/>
                    </svg>
                    <span>Edit Article</span>
                </button>
            </div>
        </div>

        <!-- Article Content -->
        <div class="py-8 px-4 mx-auto max-w-screen-2xl lg:py-14 lg:px-10 2xl:px-12">

            <!-- Loading Skeleton -->
            <div id="article-view-skeleton" class="animate-pulse max-w-5xl mx-auto">
                <div class="h-5 bg-gray-200 dark:bg-gray-700 rounded-full w-24 mb-6"></div>
                <div class="h-10 bg-gray-200 dark:bg-gray-700 rounded-full w-3/4 mb-4"></div>
                <div class="h-4 bg-gray-200 dark:bg-gray-700 rounded-full w-1/2 mb-10"></div>
                <div class="h-56 bg-gray-200 dark:bg-gray-700 rounded-xl mb-8"></div>
                <div class="space-y-3">
                    <div class="h-4 bg-gray-200 dark:bg-gray-700 rounded-full w-full"></div>
                    <div class="h-4 bg-gray-200 dark:bg-gray-700 rounded-full w-5/6"></div>
                    <div class="h-4 bg-gray-200 dark:bg-gray-700 rounded-full w-4/6"></div>
                    <div class="h-4 bg-gray-200 dark:bg-gray-700 rounded-full w-full"></div>
                    <div class="h-4 bg-gray-200 dark:bg-gray-700 rounded-full w-3/4"></div>
                </div>
            </div>

            <!-- Error State -->
            <div id="article-view-error" class="hidden max-w-5xl mx-auto py-12 px-6 border border-red-200 dark:border-red-900 bg-red-50 dark:bg-red-950/30 text-center rounded-lg">
                <svg class="mx-auto mb-4 text-red-500 w-12 h-12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path>
                </svg>
                <p id="article-view-error-msg" class="text-sm font-bold text-red-700 dark:text-red-300">Unable to load article.</p>
                <a href="/src/pages/user/admin/articles/" class="cursor-pointer mt-4 inline-flex items-center gap-2 text-sm font-semibold text-blue-600 dark:text-blue-400 hover:underline">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="m15 19-7-7 7-7"/></svg>
                    Return to Articles
                </a>
            </div>

            <!-- Article Body -->
            <article id="article-view-body" class="hidden max-w-5xl mx-auto">

                <!-- Article Header -->
                <header class="mb-8">
                    <!-- Badge + Read time row -->
                    <div class="flex items-center justify-between mb-4">
                        <span id="view-badge-container"></span>
                        <span id="view-read-time" class="text-sm text-gray-500 dark:text-gray-400 font-medium"></span>
                    </div>

                    <!-- Cover Image -->
                    <div id="view-cover-container" class="hidden rounded-xl overflow-hidden mb-6 border border-gray-100 dark:border-gray-700/50">
                        <img id="view-cover-img" src="" alt="Article cover" class="w-full h-64 lg:h-80 xl:h-96 object-cover" />
                    </div>

                    <!-- Title -->
                    <h1 id="view-title" class="mb-4 text-3xl font-extrabold leading-tight text-gray-900 lg:mb-5 lg:text-5xl dark:text-white"></h1>

                    <!-- Author / Meta -->
                    <address class="flex items-center not-italic mb-4">
                        <div class="inline-flex items-center gap-3 text-sm text-gray-600 dark:text-gray-400">
                            <img id="view-author-avatar" src="" alt="Author avatar" class="w-10 h-10 rounded-full border border-gray-200 dark:border-gray-700 object-cover" />
                            <div>
                                <span id="view-author-name" class="block font-semibold text-gray-900 dark:text-white text-sm"></span>
                                <time id="view-date" class="text-xs text-gray-400 dark:text-gray-500"></time>
                            </div>
                        </div>
                    </address>

                    <hr class="border-gray-200 dark:border-gray-700 mb-8" />
                </header>

                <!-- Article Content Body -->
                <div id="view-content"
                     class="
                        prose prose-gray dark:prose-invert max-w-none lg:prose-lg xl:prose-xl
                        prose-headings:font-extrabold
                        prose-h2:text-2xl prose-h3:text-xl prose-h4:text-lg
                        prose-a:text-blue-600 dark:prose-a:text-blue-400 prose-a:font-semibold prose-a:no-underline hover:prose-a:underline
                        prose-img:rounded-xl prose-img:shadow-md prose-img:border prose-img:border-gray-200 dark:prose-img:border-gray-700
                        prose-blockquote:border-l-4 prose-blockquote:border-blue-500 prose-blockquote:bg-blue-50 dark:prose-blockquote:bg-blue-950/20 prose-blockquote:rounded-r-lg prose-blockquote:px-4 prose-blockquote:py-2
                        prose-code:bg-gray-100 dark:prose-code:bg-gray-800 prose-code:px-1.5 prose-code:py-0.5 prose-code:rounded prose-code:text-sm
                        text-gray-700 dark:text-gray-300 leading-relaxed lg:leading-8
                     ">
                </div>

                <!-- Suggest Text / Resolution Template (if any) -->
                <div id="view-suggest-container" class="hidden mt-8 p-4 bg-blue-50 dark:bg-blue-950/40 border border-blue-200 dark:border-blue-800/60 rounded-xl">
                    <div class="flex items-center gap-2 mb-2">
                        <svg class="w-4 h-4 text-blue-600 dark:text-blue-400 shrink-0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M9.813 15.904 9 18.75l-.813-2.846a4.5 4.5 0 0 0-3.09-3.09L2.25 12l2.846-.813a4.5 4.5 0 0 0 3.09-3.09L9 5.25l.813 2.846a4.5 4.5 0 0 0 3.09 3.09L15.75 12l-2.846.813a4.5 4.5 0 0 0-3.09 3.09Z"/>
                        </svg>
                        <span class="text-xs font-bold text-blue-700 dark:text-blue-300 uppercase tracking-wide">Ticket Assistant Response Template</span>
                    </div>
                    <p id="view-suggest-text" class="text-sm text-blue-900 dark:text-blue-200 font-mono bg-white/60 dark:bg-blue-900/20 rounded-lg p-3 border border-blue-100 dark:border-blue-800/40 whitespace-pre-wrap"></p>
                </div>

                <!-- Back CTA footer -->
                <div class="mt-12 pt-6 border-t border-gray-200 dark:border-gray-700">
                    <a href="/src/pages/user/admin/articles/" class="cursor-pointer inline-flex items-center gap-2 text-sm font-semibold text-gray-500 dark:text-gray-400 hover:text-blue-600 dark:hover:text-blue-400 transition-colors">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="m15 19-7-7 7-7"/></svg>
                        Back to All Articles
                    </a>
                </div>

            </article>
        </div>
      </section>

    </main>
  </div>

  <!-- Edit Article Modal (Flowbite) -->
  <div id="editArticleModal" tabindex="-1" aria-hidden="true"
      class="hidden overflow-y-auto overflow-x-hidden fixed top-0 right-0 left-0 z-50 justify-center items-center w-full md:inset-0 h-[calc(100%-1rem)] max-h-full">
      <div class="relative p-4 w-full max-w-2xl max-h-full">
          <!-- Modal content -->
          <div class="relative bg-white border border-gray-200 dark:border-gray-700 rounded-xl shadow-xl dark:bg-gray-800">
              <!-- Modal header -->
              <div class="flex items-center justify-between p-4 md:p-5 border-b rounded-t dark:border-gray-600">
                  <h3 class="text-xl font-bold text-gray-900 dark:text-white flex items-center gap-2">
                      <svg class="w-5 h-5 text-blue-600 dark:text-blue-500" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                          <path stroke-linecap="round" stroke-linejoin="round" d="m14.304 4.844 2.852 2.852M7 7H4a1 1 0 0 0-1 1v10a1 1 0 0 0 1 1h11a1 1 0 0 0 1-1v-4.5m2.409-9.91a2.017 2.017 0 0 1 0 2.853l-6.844 6.844L8 14l.713-3.565 6.844-6.844a2.015 2.015 0 0 1 2.852 0Z"/>
                      </svg>
                      Edit Article
                  </h3>
                  <button type="button" class="cursor-pointer text-gray-400 bg-transparent hover:bg-gray-200 hover:text-gray-900 rounded-lg text-sm w-8 h-8 ms-auto inline-flex justify-center items-center dark:hover:bg-gray-600 dark:hover:text-white transition-colors" data-modal-hide="editArticleModal">
                      <svg class="w-3 h-3" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 14 14">
                          <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="m1 1 6 6m0 0 6 6M7 7l6-6M7 7l-6 6"/>
                      </svg>
                      <span class="sr-only">Close modal</span>
                  </button>
              </div>
              <!-- Modal body -->
              <form id="edit-article-form" class="p-4 md:p-5">
                  <div class="grid gap-4 mb-4 grid-cols-2">

                      <!-- Cover Image / Banner Upload & URL -->
                      <div class="col-span-2 space-y-2">
                          <label class="block text-sm font-semibold text-gray-900 dark:text-white">Article Banner / Cover Photo <span class="text-gray-400 font-normal text-xs">(Optional)</span></label>
                          <div class="flex flex-col gap-3 sm:flex-row sm:items-center">
                              <input type="file" id="edit-article-cover-file-input" accept="image/*" class="block w-full text-xs text-gray-900 border border-gray-300 rounded-lg cursor-pointer bg-gray-50 dark:text-gray-400 focus:outline-none dark:bg-gray-700 dark:border-gray-600 dark:placeholder-gray-400">
                              <span class="text-xs text-gray-400 font-semibold uppercase shrink-0 text-center">OR</span>
                              <input type="url" id="edit-article-cover-url-input" class="bg-gray-50 border border-gray-300 text-gray-900 text-xs rounded-lg focus:ring-blue-600 focus:border-blue-600 block w-full p-2.5 dark:bg-gray-700 dark:border-gray-600 dark:placeholder-gray-400 dark:text-white" placeholder="https://example.com/banner.jpg">
                          </div>
                          <!-- Live Cover Preview Banner -->
                          <div id="edit-cover-preview-container" class="hidden relative rounded-lg overflow-hidden border border-gray-200 dark:border-gray-700 max-h-40">
                              <img id="edit-cover-preview-img" src="" alt="Cover Preview" class="w-full h-36 object-cover">
                              <button type="button" id="btn-remove-edit-cover" class="absolute top-2 right-2 bg-red-600 hover:bg-red-700 text-white p-1 rounded-full text-xs cursor-pointer shadow-md" title="Remove cover">
                                  <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12"/></svg>
                              </button>
                          </div>
                      </div>
                      
                      <!-- Title Input -->
                      <div class="col-span-2">
                          <label for="edit-article-title-input" class="block mb-2 text-sm font-semibold text-gray-900 dark:text-white">Article Title <span class="text-red-500">*</span></label>
                          <input type="text" id="edit-article-title-input" required class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-600 focus:border-blue-600 block w-full p-2.5 dark:bg-gray-700 dark:border-gray-600 dark:placeholder-gray-400 dark:text-white dark:focus:ring-blue-500 dark:focus:border-blue-500 transition-colors" placeholder="e.g. Account Creation and Management">
                      </div>

                      <!-- Category Selector (Searchable Dropdown) -->
                      <div class="col-span-2 sm:col-span-1 relative">
                          <label class="block mb-2 text-sm font-semibold text-gray-900 dark:text-white">Category <span class="text-red-500">*</span></label>
                          <input type="hidden" id="edit-article-category-input" required value="Tutorial">
                          <button type="button" id="edit-modal-category-dropdown-btn" class="cursor-pointer bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-2 focus:ring-blue-500 block w-full p-2.5 dark:bg-gray-700 dark:border-gray-600 dark:text-white text-left flex justify-between items-center transition-colors">
                              <span id="edit-modal-category-selected-text">Tutorial</span>
                              <svg class="w-4 h-4 text-gray-500 dark:text-gray-400" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="m19 9-7 7-7-7"/></svg>
                          </button>
                          <div id="edit-modal-category-dropdown-list" class="absolute z-50 mt-1 w-full bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-lg shadow-lg hidden">
                              <div class="p-2 border-b border-gray-200 dark:border-gray-700">
                                  <input type="text" id="edit-modal-category-search-input" autocomplete="off" class="block w-full p-2 text-xs bg-gray-50 dark:bg-gray-900 border border-gray-300 dark:border-gray-700 rounded-md focus:ring-1 focus:ring-blue-500 text-gray-900 dark:text-white" placeholder="Search categories...">
                              </div>
                              <div class="edit-modal-category-options max-h-44 overflow-y-auto p-1">
                                  <div data-value="Tutorial" class="edit-modal-category-option cursor-pointer p-2 text-xs rounded-md text-gray-900 dark:text-white hover:bg-blue-50 dark:hover:bg-blue-900/40 font-semibold bg-blue-50 dark:bg-blue-900/30">Tutorial</div>
                                  <div data-value="User Guide" class="edit-modal-category-option cursor-pointer p-2 text-xs rounded-md text-gray-900 dark:text-white hover:bg-blue-50 dark:hover:bg-blue-900/40 font-medium">User Guide</div>
                                  <div data-value="Troubleshooting" class="edit-modal-category-option cursor-pointer p-2 text-xs rounded-md text-gray-900 dark:text-white hover:bg-blue-50 dark:hover:bg-blue-900/40 font-medium">Troubleshooting</div>
                                  <div data-value="Policy" class="edit-modal-category-option cursor-pointer p-2 text-xs rounded-md text-gray-900 dark:text-white hover:bg-blue-50 dark:hover:bg-blue-900/40 font-medium">Policy</div>
                                  <div data-value="Alert" class="edit-modal-category-option cursor-pointer p-2 text-xs rounded-md text-gray-900 dark:text-white hover:bg-blue-50 dark:hover:bg-blue-900/40 font-medium">Alert</div>
                                  <div data-value="Release" class="edit-modal-category-option cursor-pointer p-2 text-xs rounded-md text-gray-900 dark:text-white hover:bg-blue-50 dark:hover:bg-blue-900/40 font-medium">Release</div>
                              </div>
                          </div>
                      </div>

                      <!-- Read Time Input -->
                      <div class="col-span-2 sm:col-span-1">
                          <label for="edit-article-read-time-input" class="block mb-2 text-sm font-semibold text-gray-900 dark:text-white">Estimated Read Time</label>
                          <input type="text" id="edit-article-read-time-input" class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-600 focus:border-blue-600 block w-full p-2.5 dark:bg-gray-700 dark:border-gray-600 dark:placeholder-gray-400 dark:text-white dark:focus:ring-blue-500 dark:focus:border-blue-500 transition-colors" placeholder="e.g. 5 Minutes read" value="5 Minutes read">
                      </div>

                      <!-- Summary Textarea with Flowbite Rich Text Toolbar -->
                      <div class="col-span-2">
                          <label for="edit-article-summary-input" class="block mb-2 text-sm font-semibold text-gray-900 dark:text-white">Summary / Body Content <span class="text-red-500">*</span></label>
                          <div class="border border-gray-300 dark:border-gray-600 rounded-lg overflow-hidden bg-gray-50 dark:bg-gray-700 focus-within:ring-2 focus-within:ring-blue-500 focus-within:border-blue-600 transition-all">
                              <div class="flex items-center justify-between p-2 bg-gray-100 dark:bg-gray-800 border-b border-gray-300 dark:border-gray-600 flex-wrap gap-2">
                                  <div class="flex items-center gap-1 flex-wrap">
                                      <button type="button" data-edit-cmd="bold" class="cursor-pointer text-gray-700 dark:text-gray-300 hover:bg-gray-200 dark:hover:bg-gray-700 px-2 py-1 rounded text-xs font-bold" title="Bold">B</button>
                                      <button type="button" data-edit-cmd="italic" class="cursor-pointer text-gray-700 dark:text-gray-300 hover:bg-gray-200 dark:hover:bg-gray-700 px-2 py-1 rounded text-xs italic font-serif" title="Italic">I</button>
                                      <button type="button" data-edit-cmd="underline" class="cursor-pointer text-gray-700 dark:text-gray-300 hover:bg-gray-200 dark:hover:bg-gray-700 px-2 py-1 rounded text-xs underline" title="Underline">U</button>
                                      <button type="button" data-edit-cmd="strike" class="cursor-pointer text-gray-700 dark:text-gray-300 hover:bg-gray-200 dark:hover:bg-gray-700 px-2 py-1 rounded text-xs line-through" title="Strikethrough">S</button>
                                      <span class="w-px h-4 bg-gray-300 dark:bg-gray-600 mx-1"></span>
                                      <button type="button" data-edit-cmd="h3" class="cursor-pointer text-gray-700 dark:text-gray-300 hover:bg-gray-200 dark:hover:bg-gray-700 px-2 py-1 rounded text-xs font-bold" title="Heading">H3</button>
                                      <button type="button" data-edit-cmd="ul" class="cursor-pointer text-gray-700 dark:text-gray-300 hover:bg-gray-200 dark:hover:bg-gray-700 px-2 py-1 rounded text-xs font-bold" title="Bullet List">List</button>
                                  </div>
                              </div>
                              <textarea id="edit-article-summary-input" rows="5" required class="block w-full p-3 bg-transparent text-gray-900 text-sm dark:text-white focus:outline-none placeholder:text-gray-400 border-none" placeholder="Write article content here... You can use formatting tools or insert images directly."></textarea>
                          </div>
                      </div>

                      <!-- Suggest / Resolution Textarea with Dynamic Tag Chips -->
                      <div class="col-span-2">
                          <label for="edit-article-suggest-text-input" class="block mb-1 text-sm font-semibold text-gray-900 dark:text-white">Ticket Resolution / Response Template <span class="text-xs font-normal text-gray-400 dark:text-gray-500">(Used in Ticket Assistant)</span></label>
                          <textarea id="edit-article-suggest-text-input" rows="2" class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-600 focus:border-blue-600 block w-full p-2.5 dark:bg-gray-700 dark:border-gray-600 dark:placeholder-gray-400 dark:text-white dark:focus:ring-blue-500 dark:focus:border-blue-500 transition-colors" placeholder="e.g. Please refer to our knowledge base article at {link} ({read_time}) for full guidance."></textarea>
                          <div class="mt-2 flex items-center gap-1.5 flex-wrap">
                              <span class="text-xs font-medium text-gray-500 dark:text-gray-400">Click tag to insert:</span>
                              <button type="button" class="edit-btn-tag-placeholder cursor-pointer px-2 py-0.5 text-xs font-mono font-bold bg-blue-100 hover:bg-blue-200 text-blue-800 dark:bg-blue-900/60 dark:text-blue-300 rounded transition-colors" data-tag="{title}">{title}</button>
                              <button type="button" class="edit-btn-tag-placeholder cursor-pointer px-2 py-0.5 text-xs font-mono font-bold bg-purple-100 hover:bg-purple-200 text-purple-800 dark:bg-purple-900/60 dark:text-purple-300 rounded transition-colors" data-tag="{link}">{link}</button>
                              <button type="button" class="edit-btn-tag-placeholder cursor-pointer px-2 py-0.5 text-xs font-mono font-bold bg-amber-100 hover:bg-amber-200 text-amber-800 dark:bg-amber-900/60 dark:text-amber-300 rounded transition-colors" data-tag="{read_time}">{read_time}</button>
                              <button type="button" class="edit-btn-tag-placeholder cursor-pointer px-2 py-0.5 text-xs font-mono font-bold bg-emerald-100 hover:bg-emerald-200 text-emerald-800 dark:bg-emerald-900/60 dark:text-emerald-300 rounded transition-colors" data-tag="{category}">{category}</button>
                          </div>
                      </div>

                      <!-- Is Published Checkbox Toggle -->
                      <div class="col-span-2 flex items-center pt-1">
                          <input id="edit-article-published-input" type="checkbox" checked class="w-4 h-4 text-blue-600 bg-gray-100 border-gray-300 rounded focus:ring-blue-500 dark:focus:ring-blue-600 dark:ring-offset-gray-800 focus:ring-2 dark:bg-gray-700 dark:border-gray-600 cursor-pointer">
                          <label for="edit-article-published-input" class="ms-2 text-sm font-semibold text-gray-900 dark:text-gray-300 cursor-pointer">Publish article immediately</label>
                      </div>

                  </div>

                  <!-- Footer Buttons -->
                  <div class="grid grid-cols-2 gap-4 border-t border-gray-200 dark:border-gray-700 pt-4 mt-5">
                      <button type="submit" id="btn-submit-edit-article" class="cursor-pointer text-white inline-flex justify-center items-center bg-blue-700 hover:bg-blue-800 focus:ring-4 focus:outline-none focus:ring-blue-300 font-bold rounded-lg text-sm w-full py-2.5 text-center dark:bg-blue-600 dark:hover:bg-blue-700 dark:focus:ring-blue-800 transition-colors shadow-sm">
                          Update Article
                      </button>
                      <button data-modal-hide="editArticleModal" type="button" id="btn-cancel-edit-article" class="cursor-pointer text-gray-700 dark:text-gray-300 hover:text-red-600 dark:hover:text-red-400 inline-flex justify-center items-center bg-gray-100 hover:bg-gray-200 dark:bg-gray-700 dark:hover:bg-gray-600 focus:ring-4 focus:outline-none focus:ring-gray-300 font-bold rounded-lg text-sm w-full py-2.5 text-center transition-colors">
                          Cancel
                      </button>
                  </div>
              </form>
          </div>
      </div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
